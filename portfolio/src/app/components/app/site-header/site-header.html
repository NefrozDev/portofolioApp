<header class="site-header">
  <div class="container site-header__inner">

    <!-- NAV -->
    <nav class="site-header__nav">
      @for (item of navigationItems; track item.route) {
        <a
          class="site-header__link"
          [routerLink]="getLink(item.route)"
          routerLinkActive="site-header__link--active"
          [routerLinkActiveOptions]="{ exact: !item.route }"
        >
          {{ item.labelKey | translate }}
        </a>
      }
    </nav>

    <div class="site-header__right">
      <div class="site-header__lang-switch">
        <button
          type="button"
          class="site-header__lang-trigger"
          aria-haspopup="true"
          aria-controls="site-header-language-menu"
          [attr.aria-label]="('app.language' | translate) + ': ' + currentLanguage().toUpperCase()"
          [attr.aria-expanded]="isLanguageMenuOpen()"
          (click)="toggleLanguageMenu()"
        >
          <span>{{ currentLanguage().toUpperCase() }}</span>
          <span
            class="site-header__lang-chevron"
            [class.site-header__lang-chevron--open]="isLanguageMenuOpen()"
            aria-hidden="true"
          ></span>
        </button>

        <div
          id="site-header-language-menu"
          class="site-header__lang-menu"
          [class.site-header__lang-menu--open]="isLanguageMenuOpen()"
          [attr.aria-hidden]="!isLanguageMenuOpen()"
        >
          @for (lang of languages; track lang.code) {
            <button
              type="button"
              class="site-header__lang-option"
              [class.site-header__lang-option--active]="currentLanguage() === lang.code"
              [attr.aria-current]="currentLanguage() === lang.code ? 'true' : null"
              [attr.tabindex]="isLanguageMenuOpen() ? 0 : -1"
              (click)="changeLanguage(lang.code)"
            >
              <span class="site-header__lang-code">{{ lang.code.toUpperCase() }}</span>
              <span>{{ lang.label }}</span>
              @if (currentLanguage() === lang.code) {
                <span class="site-header__lang-check" aria-hidden="true">&#10003;</span>
              }
            </button>
          }
        </div>
      </div>
    </div>

  </div>
</header>
