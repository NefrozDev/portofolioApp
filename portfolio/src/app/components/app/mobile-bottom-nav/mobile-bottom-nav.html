<nav
  class="mobile-bottom-nav"
  [attr.aria-label]="'app.placeholders.mobileBottomNav' | translate"
>
  @for (item of navigationItems; track item.route) {
    <a
      class="mobile-bottom-nav__link"
      [routerLink]="getLink(item.route)"
      routerLinkActive="mobile-bottom-nav__link--active"
      [routerLinkActiveOptions]="{ exact: !item.route }"
    >
      <span class="mobile-bottom-nav__icon" aria-hidden="true">
        @switch (item.route) {
          @case ('experiences') {
            <svg viewBox="0 0 24 24">
              <path d="M8 7V5.5A2.5 2.5 0 0 1 10.5 3h3A2.5 2.5 0 0 1 16 5.5V7M4 9.5h16v9.75A1.75 1.75 0 0 1 18.25 21H5.75A1.75 1.75 0 0 1 4 19.25V9.5Zm0 4.25c5.2 2.1 10.8 2.1 16 0M10 14h4" />
            </svg>
          }
          @case ('projects') {
            <svg viewBox="0 0 24 24">
              <path d="M4 5.5A1.5 1.5 0 0 1 5.5 4h4L11 6h7.5A1.5 1.5 0 0 1 20 7.5v11A1.5 1.5 0 0 1 18.5 20h-13A1.5 1.5 0 0 1 4 18.5v-13Z" />
            </svg>
          }
          @case ('contact') {
            <svg viewBox="0 0 24 24">
              <path d="M4 6.5h16v11H4v-11Zm0 .5 8 6 8-6" />
            </svg>
          }
          @default {
            <svg viewBox="0 0 24 24">
              <path d="m3.5 11 8.5-7 8.5 7M6 9.5V20h12V9.5M9.5 20v-6h5v6" />
            </svg>
          }
        }
      </span>
      <span class="mobile-bottom-nav__label">{{ item.labelKey | translate }}</span>
    </a>
  }
</nav>
