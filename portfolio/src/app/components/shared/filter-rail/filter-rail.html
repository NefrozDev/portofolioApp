<div class="filter-rail">
  <span class="filter-rail__label">
    {{ labelKey() | translate }}
  </span>

  <div class="filter-rail__viewport">
    <button
      type="button"
      class="filter-rail__arrow filter-rail__arrow--left"
      [disabled]="!canScrollLeft()"
      [attr.aria-label]="'app.scrollFiltersLeft' | translate"
      (click)="scrollRailBy(scrollRail, -1)"
    >
      <span class="filter-rail__arrow-icon" aria-hidden="true">
        <span>&lsaquo;</span><span>&lsaquo;</span>
      </span>
    </button>

    <div
      #scrollRail
      class="filter-rail__scroll"
      [class.filter-rail__scroll--dragging]="isDragging()"
      role="group"
      [attr.aria-label]="labelKey() | translate"
      (wheel)="onWheel($event)"
      (pointerdown)="onPointerDown($event)"
      (pointermove)="onPointerMove($event)"
      (pointerup)="onPointerEnd($event)"
      (pointerleave)="onPointerEnd($event)"
      (pointercancel)="onPointerEnd($event)"
      (scroll)="onScroll($event)"
    >
      <button
        type="button"
        class="filter-rail__chip"
        [class.filter-rail__chip--active]="!selectedValues().length"
        [attr.aria-pressed]="!selectedValues().length"
        (pointerdown)="$event.stopPropagation()"
        (click)="selectAll($event)"
      >
        {{ allLabelKey() | translate }}
      </button>

      @for (option of options(); track option.value) {
        <button
          type="button"
          class="filter-rail__chip"
          [class.filter-rail__chip--active]="isSelected(option.value)"
          [attr.aria-pressed]="isSelected(option.value)"
          (pointerdown)="$event.stopPropagation()"
          (click)="selectOption($event, option.value)"
        >
          @if (option.infoKey) {
            <app-info-term
              [label]="
                option.labelKey
                  ? (option.labelKey | translate)
                  : (option.label ?? option.value)
              "
              [descriptionKey]="option.infoKey"
              [embedded]="true"
            />
          } @else if (option.labelKey) {
            {{ option.labelKey | translate }}
          } @else {
            {{ option.label }}
          }
        </button>
      }
    </div>

    <button
      type="button"
      class="filter-rail__arrow filter-rail__arrow--right"
      [disabled]="!canScrollRight()"
      [attr.aria-label]="'app.scrollFiltersRight' | translate"
      (click)="scrollRailBy(scrollRail, 1)"
    >
      <span class="filter-rail__arrow-icon" aria-hidden="true">
        <span>&rsaquo;</span><span>&rsaquo;</span>
      </span>
    </button>
  </div>
</div>
