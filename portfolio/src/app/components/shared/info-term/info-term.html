<span
  class="info-term"
  [class.info-term--open]="isOpen()"
  (mouseenter)="onPointerEnter()"
  (mouseleave)="onPointerLeave()"
>
  @if (embedded()) {
    <span class="info-term__trigger" (click)="toggle()">
      <span class="info-term__label">{{ label() }}</span>
    </span>
  } @else {
    <button
      class="info-term__trigger"
      type="button"
      [attr.aria-describedby]="tooltipId"
      [attr.aria-expanded]="isOpen()"
      [attr.aria-label]="
        'app.glossaryInfoLabel' | translate: { term: label() }
      "
      (click)="toggle()"
    >
      <span class="info-term__label">{{ label() }}</span>
    </button>
  }

  <span
    #tooltip
    class="info-term__tooltip"
    [class.info-term__tooltip--embedded]="embedded()"
    [id]="tooltipId"
    role="tooltip"
    [attr.aria-hidden]="embedded() ? 'true' : null"
    [attr.popover]="embedded() ? 'manual' : null"
    [style.left.px]="embedded() ? tooltipLeft() : null"
    [style.top.px]="embedded() ? tooltipTop() : null"
  >
    {{ descriptionKey() | translate }}
  </span>
</span>
