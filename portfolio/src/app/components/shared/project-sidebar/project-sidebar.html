<aside class="project-sidebar glass-card">
  <div class="project-sidebar__list">
    @for (project of projects(); track project.id) {
      <button
        type="button"
        class="project-sidebar__item"
        [class.project-sidebar__item--active]="isProjectActive(project.id)"
        (click)="selectProject(project.id)"
      >
        <span class="project-sidebar__item-title">{{ project.shortLabel }}</span>
        <span class="project-sidebar__item-meta">
          {{ project.technologies.slice(0, 2).join(' · ') }}
        </span>
      </button>
    }
  </div>
</aside>
