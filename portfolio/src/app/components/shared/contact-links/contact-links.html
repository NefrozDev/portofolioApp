<nav class="contact-links" [attr.aria-label]="'app.placeholders.contactLinks' | translate">
  @for (link of links; track link.href; let index = $index) {
    <a
      class="contact-links__item"
      [href]="link.href"
      [attr.target]="link.external ? '_blank' : null"
      [attr.rel]="link.external ? 'noreferrer' : null"
      [style.--contact-link-highlight-delay]="(index * 900 + 250) + 'ms'"
    >
      <img
        class="contact-links__icon"
        [src]="link.iconSrc"
        alt=""
        aria-hidden="true"
        loading="lazy"
      />

      <span class="contact-links__content">
        <span class="contact-links__value">
          {{ link.value }}
        </span>
      </span>
    </a>
  }
</nav>
