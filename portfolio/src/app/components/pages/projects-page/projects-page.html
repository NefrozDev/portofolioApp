<section class="page-shell projects-page">
  <div class="page-content">
    <main class="section projects-page__main">
      <div class="container">
        <app-section-hero
          [title]="'projects.title' | translate"
          [subtitle]="'projects.subtitle' | translate"
          [warningLabel]="'app.pageUnderConstruction' | translate"
        ></app-section-hero>

        @if (isLoading()) {
          <div class="projects-page__empty glass-card">
            <p>{{ 'projects.loading' | translate }}</p>
          </div>
        } @else if (loadError()) {
          <div class="projects-page__empty glass-card">
            <p>{{ (loadError() ?? '') | translate }}</p>
          </div>
        } @else {
          <section class="projects-page__filters">
            <app-filter-rail
              [labelKey]="'projects.categoryLabel'"
              [allLabelKey]="'projects.categories.all'"
              [options]="categoryFilterOptions"
              [selectedValues]="selectedCategoryValues()"
              (allSelected)="selectCategory('all')"
              (optionSelected)="selectCategoryValue($event)"
            ></app-filter-rail>

            <div class="projects-page__tag-filters">
              <app-filter-rail
                [labelKey]="'projects.tagLabel'"
                [allLabelKey]="'projects.categories.all'"
                [options]="tagFilterOptions()"
                [selectedValues]="selectedTags()"
                (allSelected)="clearTags()"
                (optionSelected)="toggleTagValue($event)"
              ></app-filter-rail>

              @if (hasActiveFilters()) {
                <button
                  type="button"
                  class="projects-page__clear-filters"
                  (click)="clearFilters()"
                >
                  {{ 'projects.clearFilters' | translate }}
                </button>
              }
            </div>
          </section>

          <div class="projects-page__layout">
            <app-project-sidebar
              [projects]="filteredProjects()"
              [selectedProjectId]="selectedProjectId()"
              (projectSelected)="selectProject($event)"
            ></app-project-sidebar>

            @if (selectedProject(); as project) {
              <app-project-detail [project]="project"></app-project-detail>
            } @else {
              <div class="projects-page__empty glass-card">
                <p>{{ 'projects.emptyFilters' | translate }}</p>

                @if (hasActiveFilters()) {
                  <button
                    type="button"
                    class="app-button app-button--ghost"
                    (click)="clearFilters()"
                  >
                    {{ 'projects.clearFilters' | translate }}
                  </button>
                }
              </div>
            }
          </div>
        }
      </div>
    </main>
  </div>
</section>
