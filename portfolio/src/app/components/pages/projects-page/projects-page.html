<section class="page-shell projects-page">
  <div class="page-content">
    <main class="section projects-page__main">
      <div class="container">
        <app-section-hero
          [title]="'projects.title' | translate"
          [subtitle]="'projects.subtitle' | translate"
        ></app-section-hero>

        @if (isLoading()) {
          <div class="projects-page__empty glass-card">
            <p>{{ 'projects.loading' | translate }}</p>
          </div>
        } @else if (loadError()) {
          <div class="projects-page__empty glass-card">
            <p>{{ (loadError() ?? '') | translate }}</p>
          </div>
        } @else {
          <div class="projects-page__toolbar">
            <span class="projects-page__toolbar-label">{{ 'projects.sortBy' | translate }}</span>

            <button
              type="button"
              class="projects-page__toolbar-button"
              [class.projects-page__toolbar-button--active]="selectedCategory() === 'all'"
              (click)="selectCategory('all')"
            >
              {{ 'projects.categories.all' | translate }}
            </button>
          </div>

          <div class="projects-page__layout">
            <app-project-sidebar
              [projects]="filteredProjects()"
              [selectedCategory]="selectedCategory()"
              [selectedProjectId]="selectedProjectId()"
              (categorySelected)="selectCategory($event)"
              (projectSelected)="selectProject($event)"
            ></app-project-sidebar>

            @if (selectedProject(); as project) {
              <app-project-detail [project]="project"></app-project-detail>
            } @else {
              <div class="projects-page__empty glass-card">
                <p>{{ 'projects.emptyCategory' | translate }}</p>
              </div>
            }
          </div>
        }
      </div>
    </main>
  </div>
</section>
