<section class="page-shell experiences-page">
  <div class="page-content">
    <main class="section experiences-page__main">
      <div class="container">
        <app-section-hero
          [title]="'experiences.title' | translate"
          [subtitle]="'experiences.subtitle' | translate"
        ></app-section-hero>

        @if (isLoading()) {
          <app-experience-loader />
        } @else if (loadError()) {
          <div class="experiences-page__empty glass-card">
            <p>{{ (loadError() ?? '') | translate }}</p>
          </div>
        } @else {
          <app-filter-rail
            class="experiences-page__toolbar"
            [labelKey]="'experiences.technologies'"
            [allLabelKey]="'experiences.all'"
            [options]="technologyFilterOptions()"
            [selectedValues]="selectedTechnologyTags()"
            (allSelected)="clearTechnologyFilters()"
            (optionSelected)="toggleTechnologyFilter($event)"
          ></app-filter-rail>

          <div class="experiences-page__list">
            @for (experience of filteredExperiences(); track experience.id) {
              <app-experience-card
                [experience]="experience"
                (toggle)="toggleExperience($event)"
              ></app-experience-card>
            } @empty {
              <div class="experiences-page__empty glass-card">
                <p>{{ 'experiences.empty' | translate }}</p>
              </div>
            }
          </div>
        }
      </div>
    </main>

    <app-mobile-bottom-nav class="mobile-only"></app-mobile-bottom-nav>
  </div>
</section>
