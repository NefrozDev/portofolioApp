<section class="page-shell experiences-page">
  <div class="page-content">
    <main class="section experiences-page__main">
      <div class="container">
        <app-section-hero
          [title]="'experiences.title' | translate"
          [subtitle]="'experiences.subtitle' | translate"
        ></app-section-hero>

        @if (isLoading()) {
          <div class="experiences-page__empty glass-card">
            <p>{{ 'experiences.loading' | translate }}</p>
          </div>
        } @else if (loadError()) {
          <div class="experiences-page__empty glass-card">
            <p>{{ (loadError() ?? '') | translate }}</p>
          </div>
        } @else {
          <div class="experiences-page__toolbar">
            <span class="experiences-page__toolbar-label">{{ 'experiences.sortBy' | translate }}</span>
            <button
              type="button"
              class="experiences-page__toolbar-button"
            >
              {{ 'experiences.all' | translate }}
            </button>
          </div>

          <div class="experiences-page__list">
            @for (experience of experiences(); track experience.id) {
              <app-experience-card
                [experience]="experience"
                (toggle)="toggleExperience($event)"
              ></app-experience-card>
            } @empty {
              <div class="experiences-page__empty glass-card">
                <p>{{ 'experiences.empty' | translate }}</p>
              </div>
            }
          </div>
        }
      </div>
    </main>

    <app-mobile-bottom-nav class="mobile-only"></app-mobile-bottom-nav>
  </div>
</section>
